<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字展销平台首页</title>
    <!-- 引入CSS文件 -->
    <link rel="stylesheet" href="css/lab2-xxx-index.css">
    <style>
        /* 简单给图片加样式，防止变形 */
        .book-item img {
            width: 100px;
            height: 140px;
            object-fit: cover;
            display: block;
            margin: 0 auto 5px;
        }
    </style>
</head>
<body>
    <!-- 1. 头部区域 (固定定位 + 浮动) -->
    <header class="header">
        <div class="logo">图书展销平台</div>
        <nav class="nav">
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#">图书分类</a></li>
                <li><a href="#">热门推荐</a></li>
                <li><a href="#">新书上市</a></li>
                <li><a href="#">关于我们</a></li>
            </ul>
        </nav>
    </header>

    <!-- 2. 主体内容 (浮动三栏布局) -->
    <div class="container">
        <!-- 左侧栏 (相对定位) -->
        <aside class="sidebar-left">
            <h3>图书分类</h3>
            <ul>
                <li>计算机科学</li>
                <li>文学小说</li>
                <li>经管励志</li>
                <li>历史社科</li>
                <li>少儿读物</li>
            </ul>
        </aside>

        <!-- 中间栏 (核心内容区) -->
        <main class="content">
            <!-- 第一部分：热门推荐 (浮动排列) -->
            <section class="hot-recommend">
                <h3>热门推荐</h3>
                <div class="book-list">
                    <!-- 父盒子，子元素浮动 -->
                    <div class="book-item">
                        <!-- 第1张图片 -->
                        <img src="https://peng669.github.io/-/图片4.webp" alt="计算机基础">
                        计算机基础
                    </div>
                    <div class="book-item">
                        <!-- 第2张图片 -->
                        <img src="https://peng669.github.io/-/图片5.jpg" alt="Python编程">
                        Python编程
                    </div>
                    <div class="book-item">
                        <!-- 第3张图片 -->
                        <img src="https://peng669.github.io/-/图片6.png" alt="数据结构">
                        数据结构
                    </div>
                    <div class="book-item">
                        <!-- 第4张图片 -->
                        <img src="https://peng669.github.io/-/图片7.jpg" alt="网络安全">
                        网络安全
                    </div>
                </div>
            </section>

            <!-- 第二部分：新书上市 (Table布局) -->
            <section class="new-book">
                <h3>新书上市</h3>
                <table border="1" cellpadding="8" cellspacing="0">
                    <tr>
                        <th>书名</th>
                        <th>作者</th>
                        <th>定价</th>
                        <th>出版日期</th>
                    </tr>
                    <tr>
                        <td>Web前端开发</td>
                        <td>张三</td>
                        <td>¥79.00</td>
                        <td>2024-01</td>
                    </tr>
                    <tr>
                        <td>人工智能导论</td>
                        <td>李四</td>
                        <td>¥69.00</td>
                        <td>2024-02</td>
                    </tr>
                </table>
            </section>
        </main>

        <!-- 右侧栏 (固定定位) -->
        <aside class="sidebar-right">
            <p>促销广告</p>
            <p>满100减30</p>
        </aside>
    </div>

</body>
</html>
